name: twake_calendar_mobile
description: "Twake Calendar — Flutter mobile (PoC personnel, port de twake-calendar-frontend)."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management & DI
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^16.2.4

  # Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # HTTP
  dio: ^5.7.0
  retrofit: '>=4.6.0 <4.9.0'

  # Auth
  flutter_appauth: ^7.0.0
  flutter_secure_storage: ^9.2.4

  # Storage
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.27
  path_provider: ^2.1.5
  path: ^1.9.0
  shared_preferences: ^2.3.3

  # Realtime
  web_socket_channel: ^3.0.1

  # Reactive
  rxdart: ^0.28.0

  # Notifications
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1

  # Connectivity
  connectivity_plus: ^6.1.0

  # i18n
  intl: ^0.20.0

  # Time
  timezone: ^0.10.0

  # UI
  flutter_svg: ^2.0.16
  lottie: ^3.2.0
  gap: ^3.0.1
  table_calendar: ^3.1.2

  # Utilities
  collection: ^1.18.0
  meta: ^1.16.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.5
  retrofit_generator: 9.6.0
  go_router_builder: ^3.0.1
  drift_dev: ^2.21.0
  # Tests
  mockito: ^5.4.4
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter
  patrol: ^3.13.0
  patrol_finders: ^2.5.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
